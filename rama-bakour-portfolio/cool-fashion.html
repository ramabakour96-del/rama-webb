    <main>
        <section class="project-detail">
            <p class="eyebrow">UX och e-handel</p>

            <h1>Cool Fashion</h1>

            <p class="section-intro">
                Cool Fashion är en mobilanpassad webbshop som jag
                designade i Figma. Projektet visar ett användarflöde
                från startsidan till sökning, produktsida och varukorg.
            </p>

            <div class="project-gallery">

                <figure>
                    <img
                        src="assets/images/Cool-fashion-startsida.png"
                        alt="Introduktionssida i Cool Fashion med modebild och knapp"
                    >

                    <figcaption>
                        <strong>Introduktionssida</strong>
                        Den första sidan användaren möter med tydlig
                        bild, budskap och knapp.
                    </figcaption>
                </figure>

                <figure>
                    <img
                        src="assets/images/cool-fashion-home.png"
                        alt="Startsidan i Cool Fashion-webbshoppen"
                    >

                    <figcaption>
                        <strong>Startsida</strong>
                        Startsidan visar webbshoppens innehåll och
                        hjälper användaren att navigera vidare.
                    </figcaption>
                </figure>

                <figure>
                    <img
                        src="assets/images/Cool-fashion-search.png"
                        alt="Söksidan i Cool Fashion-projektet"
                    >

                    <figcaption>
                        <strong>Sökning</strong>
                        Användaren kan söka efter produkter och
                        snabbt hitta rätt kategori.
                    </figcaption>
                </figure>

                <figure>
                    <img
                        src="assets/images/cool-fashion-produktsida.png"
                        alt="Produktsidan i Cool Fashion-projektet"
                    >

                    <figcaption>
                        <strong>Produktsida</strong>
                        Här visas produkten med information och möjlighet
                        att lägga den i varukorgen.
                    </figcaption>
                </figure>

                <figure>
                    <img
                        src="assets/images/cool-fashion-varukorg.png"
                        alt="Varukorgen i Cool Fashion-projektet"
                    >

                    <figcaption>
                        <strong>Varukorg</strong>
                        Varukorgen visar användarens valda produkt innan köp.
                    </figcaption>
                </figure>

            </div>

            <a href="projects.html" class="button">
                Tillbaka till alla projekt
